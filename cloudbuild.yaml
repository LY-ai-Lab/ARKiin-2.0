# ARKiin v2.0 — Cloud Build CI/CD Pipeline
# Triggered on push to main branch
# Steps: Test → Build → Push → Terraform Apply → Deploy

substitutions:
  _REGION: europe-west3
  _REPO: europe-west3-docker.pkg.dev/arkiin/arkiin
  _SERVICE: arkiin-api

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ============================================================
  # STEP 1: Python Tests
  # ============================================================
  - name: python:3.11-slim
    id: python-test
    entrypoint: bash
    args:
      - -c
      - |
        pip install -r backend/requirements.txt --quiet
        cd backend
        python -m pytest tests/ -v --tb=short
    env:
      - GOOGLE_CLOUD_PROJECT=arkiin

  # ============================================================
  # STEP 2: Build Backend Docker Image
  # ============================================================
  - name: gcr.io/cloud-builders/docker
    id: docker-build
    args:
      - build
      - -t
      - ${_REPO}/${_SERVICE}:$COMMIT_SHA
      - -t
      - ${_REPO}/${_SERVICE}:latest
      - --cache-from
      - ${_REPO}/${_SERVICE}:latest
      - backend/
    waitFor: [python-test]

  # ============================================================
  # STEP 3: Push to Artifact Registry
  # ============================================================
  - name: gcr.io/cloud-builders/docker
    id: docker-push-sha
    args: [push, '${_REPO}/${_SERVICE}:$COMMIT_SHA']
    waitFor: [docker-build]

  - name: gcr.io/cloud-builders/docker
    id: docker-push-latest
    args: [push, '${_REPO}/${_SERVICE}:latest']
    waitFor: [docker-build]

  # ============================================================
  # STEP 4: Terraform Plan & Apply
  # ============================================================
  - name: hashicorp/terraform:1.8.0
    id: terraform-init
    entrypoint: sh
    args:
      - -c
      - |
        cd terraform
        terraform init -input=false
    waitFor: [-]

  - name: hashicorp/terraform:1.8.0
    id: terraform-apply
    entrypoint: sh
    args:
      - -c
      - |
        cd terraform
        terraform apply -auto-approve -input=false
    waitFor: [terraform-init, docker-push-latest]

  # ============================================================
  # STEP 5: Deploy to Cloud Run
  # ============================================================
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: cloud-run-deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REPO}/${_SERVICE}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - GOOGLE_CLOUD_PROJECT=arkiin
      - --memory
      - 2Gi
      - --cpu
      - '2'
      - --max-instances
      - '10'
      - --service-account
      - arkiin-api-sa@arkiin.iam.gserviceaccount.com
    waitFor: [terraform-apply]

  # ============================================================
  # STEP 6: Smoke Test
  # ============================================================
  - name: curlimages/curl
    id: smoke-test
    entrypoint: sh
    args:
      - -c
      - |
        sleep 10
        HEALTH=$(curl -s -o /dev/null -w "%{http_code}" https://arkiin-api-xxxxx-ey.a.run.app/health)
        if [ "$HEALTH" != "200" ]; then
          echo "Smoke test FAILED: $HEALTH"
          exit 1
        fi
        echo "Smoke test PASSED"
    waitFor: [cloud-run-deploy]

images:
  - ${_REPO}/${_SERVICE}:$COMMIT_SHA
  - ${_REPO}/${_SERVICE}:latest
