substitutions:
  _REGION: europe-west3
  _REPO: europe-west3-docker.pkg.dev/arkiin/arkiin
  _SERVICE: arkiin-api

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: python:3.11-slim
    id: python-test
    entrypoint: bash
    args:
      - -c
      - |
        pip install pytest==8.2.0 httpx==0.27.0 --quiet
        cd backend
        if [ -d tests ]; then python -m pytest tests/ -v --tb=short; else echo 'No tests dir, skipping'; fi
    env:
      - GOOGLE_CLOUD_PROJECT=arkiin

  - name: gcr.io/cloud-builders/docker
    id: docker-build
    args:
      - build
      - -t
      - ${_REPO}/${_SERVICE}:$COMMIT_SHA
      - -t
      - ${_REPO}/${_SERVICE}:latest
      - --cache-from
      - ${_REPO}/${_SERVICE}:latest
      - backend/
    waitFor: [python-test]

  - name: gcr.io/cloud-builders/docker
    id: docker-push-sha
    args: [push, '${_REPO}/${_SERVICE}:$COMMIT_SHA']
    waitFor: [docker-build]

  - name: gcr.io/cloud-builders/docker
    id: docker-push-latest
    args: [push, '${_REPO}/${_SERVICE}:latest']
    waitFor: [docker-build]

  - name: hashicorp/terraform:1.8.0
    id: terraform-init
    entrypoint: sh
    args:
      - -c
      - |
        cd terraform
        terraform init -input=false
    waitFor: [-]

  - name: hashicorp/terraform:1.8.0
    id: terraform-apply
    entrypoint: sh
    args:
      - -c
      - |
        cd terraform
        terraform state rm google_service_account.cloud_run_sa 2>/dev/null || true
        terraform state rm google_artifact_registry_repository.docker 2>/dev/null || true
        terraform state rm google_firestore_database.default 2>/dev/null || true
        terraform state rm google_storage_bucket.floor_plans 2>/dev/null || true
        terraform import -input=false google_service_account.cloud_run_sa projects/arkiin/serviceAccounts/arkiin-api-sa@arkiin.iam.gserviceaccount.com || true
        terraform import -input=false google_artifact_registry_repository.docker projects/arkiin/locations/europe-west3/repositories/arkiin || true
        terraform import -input=false google_firestore_database.default projects/arkiin/databases/\(default\) || true
        terraform import -input=false google_storage_bucket.floor_plans arkiin-floor-plans || true
        terraform apply -auto-approve -input=false -parallelism=1
    waitFor: [terraform-init, docker-push-latest]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: cloud-run-deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REPO}/${_SERVICE}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - GOOGLE_CLOUD_PROJECT=arkiin
      - --memory
      - 2Gi
      - --cpu
      - '2'
      - --max-instances
      - '10'
      - --service-account
      - arkiin-api-sa@arkiin.iam.gserviceaccount.com
    waitFor: [terraform-apply]

  - name: curlimages/curl
    id: smoke-test
    entrypoint: sh
    args:
      - -c
      - |
        sleep 10
        SERVICE_URL=$$(gcloud run services describe ${_SERVICE} --region ${_REGION} --format='value(status.url)' --project=arkiin 2>/dev/null || echo '')
        if [ -z "$$SERVICE_URL" ]; then
          echo "Could not get service URL, skipping smoke test"
          exit 0
        fi
        HTTP_CODE=$$(curl -s -o /dev/null -w "%{http_code}" $$SERVICE_URL/health)
        if [ "$$HTTP_CODE" != "200" ]; then
          echo "Smoke test FAILED: $$HTTP_CODE"
          exit 1
        fi
        echo "Smoke test PASSED"
    waitFor: [cloud-run-deploy]

images:
  - ${_REPO}/${_SERVICE}:$COMMIT_SHA
  - ${_REPO}/${_SERVICE}:latest
